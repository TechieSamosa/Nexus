<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- The Stark "Arc Reactor" Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Deep Space Cybernetic Background -->
  <rect width="100" height="100" rx="24" fill="#0c0b11" />
  
  <!-- Outer Orbit (ISRO / Aerospace) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#00f2fe" stroke-width="2" stroke-dasharray="4 8" opacity="0.6"/>
  
  <!-- Inner Arc Reactor Ring (Iron Man / Systems) -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#00f2fe" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Neural Nodes -->
  <circle cx="50" cy="18" r="2.5" fill="#00f2fe" filter="url(#glow)"/>
  <circle cx="22.2" cy="66" r="2.5" fill="#00f2fe" filter="url(#glow)"/>
  <circle cx="77.8" cy="66" r="2.5" fill="#00f2fe" filter="url(#glow)"/>
  
  <!-- The "A" / Rocket / Data Trajectory -->
  <path d="M 50 28 L 68 62 L 58 62 L 50 46 L 42 62 L 32 62 Z" fill="#00f2fe" filter="url(#glow)"/>
  
  <!-- The Purple "Loss Particle" from your AI Game -->
  <circle cx="50" cy="58" r="4.5" fill="#8b5cf6" filter="url(#glow)"/>
</svg>
